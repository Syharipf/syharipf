name: Generate Daily Anime Quote

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Random Anime Quote
        id: get_quote
        run: |
          # Mengambil quote gratis dari API publik berbasis teks yang sangat ringan
          RESPONSE=$(curl -s "https://api.manisandher.dev/api/quotes/random")
          if [ -z "$RESPONSE" ] || echo "$RESPONSE" | grep -q "error"; then
            # Backup quote jika API utama sedang sibuk
            QUOTE="In the end, you choose what you choose."
            CHARACTER="Eren Yeager"
            ANIME="Attack on Titan"
          else
            QUOTE=$(echo "$RESPONSE" | jq -r '.quote')
            CHARACTER=$(echo "$RESPONSE" | jq -r '.character')
            ANIME=$(echo "$RESPONSE" | jq -r '.anime')
          fi
          
          # Format string quote
          FORMATTED_QUOTE="> \"$QUOTE\" — **$CHARACTER** (_$ANIME_)"
          echo "formatted_quote=$FORMATTED_QUOTE" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          # Mengganti teks di antara tag penanda di README
          sed -i '//,// {
            //b
            //b
            d
          }' README.md
          
          sed -i '//a '"$formatted_quote"'' README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update daily anime quote" && git push
